<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hybrid Calorie Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --color-dark-green: #14221b; --color-beige: #d9d2c5; --color-accent: #c5b358; }
        body { font-family: 'Inter', sans-serif; background-color: var(--color-dark-green); color: var(--color-beige); margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .btn-primary { background-color: var(--color-beige); color: var(--color-dark-green); font-weight: 600; transition: all 0.3s ease; }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
        .progress-bar { height: 8px; border-radius: 4px; background: rgba(217, 210, 197, 0.2); overflow: hidden; }
        .progress-fill { height: 100%; background: var(--color-beige); transition: width 0.5s ease-out; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input, select { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(217, 210, 197, 0.3); color: var(--color-beige); border-radius: 12px; padding: 12px; width: 100%; outline: none; font-size: 16px; }
        input:focus { border-color: var(--color-beige); }
    </style>
</head>
<body class="p-4">
    <!-- Subscription Overlay -->
    <div id="sub-overlay" class="fixed inset-0 z-50 bg-[#14221b] flex flex-col items-center justify-center p-8 text-center hidden">
        <h2 class="text-3xl mb-6 text-beige">Доступ ограничен</h2>
        <p class="mb-8 opacity-80 text-beige">Подпишитесь на канал для использования приложения.</p>
        <a href="https://t.me/hybriddepartment" target="_blank" class="btn-primary py-4 px-8 rounded-full w-full mb-4 text-center">Подписаться</a>
        <button onclick="checkSubscription()" class="text-beige border border-beige/30 py-3 px-8 rounded-full w-full">Я подписался</button>
    </div>

    <div id="app-container" class="max-w-md mx-auto pb-24">
        <header class="flex justify-between items-center mb-8">
            <div><h1 class="text-2xl tracking-wider uppercase">Hybrid</h1><p class="text-xs opacity-60 uppercase tracking-widest">Nutrition System</p></div>
            <div id="user-avatar" class="w-10 h-10 rounded-full bg-beige/20 border border-beige/30 overflow-hidden"><img id="avatar-img" src="" class="w-full h-full object-cover hidden"></div>
        </header>

        <!-- Dashboard -->
        <section id="dashboard-view" class="tab-content active">
            <div class="glass-card p-6 mb-6">
                <div class="flex justify-between items-end mb-4">
                    <div><p class="text-xs opacity-60 uppercase">Осталось калорий</p><h2 class="text-5xl" id="calories-left">0</h2></div>
                    <div class="text-right"><p class="text-xs opacity-60 uppercase">Всего</p><p class="text-xl" id="calories-target">0</p></div>
                </div>
                <div class="progress-bar mb-6"><div id="calories-progress" class="progress-fill" style="width: 0%"></div></div>
                <div class="grid grid-cols-3 gap-4">
                    <div><p class="text-[10px] opacity-60 uppercase mb-1">Белки</p><div class="progress-bar h-1.5 mb-1"><div id="p-progress" class="progress-fill" style="width: 0%"></div></div><p class="text-xs"><span id="p-current">0</span>/<span id="p-target">0</span>г</p></div>
                    <div><p class="text-[10px] opacity-60 uppercase mb-1">Жиры</p><div class="progress-bar h-1.5 mb-1"><div id="f-progress" class="progress-fill" style="width: 0%"></div></div><p class="text-xs"><span id="f-current">0</span>/<span id="f-target">0</span>г</p></div>
                    <div><p class="text-[10px] opacity-60 uppercase mb-1">Углеводы</p><div class="progress-bar h-1.5 mb-1"><div id="c-progress" class="progress-fill" style="width: 0%"></div></div><p class="text-xs"><span id="c-current">0</span>/<span id="c-target">0</span>г</p></div>
                </div>
            </div>
            <div class="flex justify-between items-center mb-4"><h3 class="text-xl">Сегодня</h3><button onclick="showTab('manual')" class="btn-primary px-4 py-2 rounded-full text-xs uppercase">+ Добавить еду</button></div>
            <div id="diary-list" class="space-y-3"></div>
        </section>

        <!-- Manual Add -->
        <section id="manual-view" class="tab-content">
            <h2 class="text-3xl mb-6">Новая запись</h2>
            <div class="glass-card p-6 space-y-4">
                <div><label class="text-xs opacity-60 block mb-1 uppercase">Название</label><input type="text" id="m-name" placeholder="Напр: Рис с курицей"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs opacity-60 block mb-1 uppercase">Вес (г)</label><input type="number" id="m-weight" value="100" oninput="recalcManual()"></div>
                    <div><label class="text-xs opacity-60 block mb-1 uppercase">Кал (на 100г)</label><input type="number" id="m-k" placeholder="150" oninput="recalcManual()"></div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div><label class="text-xs opacity-60 block mb-1 uppercase">Б (100г)</label><input type="number" id="m-p" placeholder="10" oninput="recalcManual()"></div>
                    <div><label class="text-xs opacity-60 block mb-1 uppercase">Ж (100г)</label><input type="number" id="m-f" placeholder="5" oninput="recalcManual()"></div>
                    <div><label class="text-xs opacity-60 block mb-1 uppercase">У (100г)</label><input type="number" id="m-c" placeholder="20" oninput="recalcManual()"></div>
                </div>
                <div class="p-4 bg-white/5 rounded-xl text-center border border-white/10">
                    <p class="text-xs opacity-60 uppercase mb-1">Итого в порции</p>
                    <p id="m-total" class="font-bold text-2xl text-beige">0 ккал</p>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="showTab('dashboard')" class="flex-1 py-4 border border-beige/30 rounded-xl uppercase text-xs font-bold">Отмена</button>
                    <button onclick="saveManual()" class="flex-[2] btn-primary py-4 rounded-xl uppercase text-xs font-bold">Добавить в дневник</button>
                </div>
            </div>
        </section>

        <!-- Profile -->
        <section id="profile-view" class="tab-content">
            <h2 class="text-3xl mb-6">Ваш профиль</h2>
            <div class="glass-card p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs opacity-60 block mb-1 uppercase">Пол</label><select id="gender"><option value="male">Мужской</option><option value="female">Женский</option></select></div>
                    <div><label class="text-xs opacity-60 block mb-1 uppercase">Возраст</label><input type="number" id="age" placeholder="25"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs opacity-60 block mb-1 uppercase">Вес (кг)</label><input type="number" id="weight" placeholder="75"></div>
                    <div><label class="text-xs opacity-60 block mb-1 uppercase">Рост (см)</label><input type="number" id="height" placeholder="180"></div>
                </div>
                <div><label class="text-xs opacity-60 block mb-1 uppercase">Активность</label><select id="activity"><option value="1.2">Минимальная</option><option value="1.375">Слабая</option><option value="1.55">Средняя</option><option value="1.725">Высокая</option><option value="1.9">Экстремальная</option></select></div>
                <button onclick="saveProfile()" class="btn-primary w-full py-4 rounded-xl mt-4 uppercase text-xs font-bold">Сохранить и рассчитать</button>
            </div>
        </section>

        <!-- Navigation -->
        <nav class="fixed bottom-6 left-4 right-4 h-20 glass-card flex items-center justify-around px-4">
            <button onclick="showTab('dashboard')" class="nav-btn flex flex-col items-center transition-all" id="nav-dashboard">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                <span class="text-[10px] uppercase mt-1">Дневник</span>
            </button>
            <button onclick="showTab('profile')" class="nav-btn flex flex-col items-center opacity-40" id="nav-profile">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                <span class="text-[10px] uppercase mt-1">Профиль</span>
            </button>
        </nav>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let userProfile = null;
        let diary = [];
        const BOT_TOKEN = '8821569325:AAEz0hGIVdG1Ti3lCNuR9twOxre_uDqFHRI';
        const CHANNEL_ID = '@hybriddepartment';

        function init() {
            checkSubscription();
            loadUserData();
            if (tg.initDataUnsafe?.user?.photo_url) {
                const img = document.getElementById('avatar-img');
                img.src = tg.initDataUnsafe.user.photo_url;
                img.classList.remove('hidden');
            }
            if (userProfile) {
                showTab('dashboard');
            } else {
                showTab('profile');
            }
            updateUI();
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId + '-view').classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.add('opacity-40'));
            const navBtn = document.getElementById('nav-' + (tabId === 'manual' ? 'dashboard' : tabId));
            if (navBtn) navBtn.classList.remove('opacity-40');
        }

        function loadUserData() {
            const saved = localStorage.getItem('hybrid_user_profile');
            if (saved) {
                userProfile = JSON.parse(saved);
                const savedDiary = localStorage.getItem('hybrid_diary_' + getTodayKey());
                if (savedDiary) diary = JSON.parse(savedDiary);
            }
        }

        function saveProfile() {
            const age = document.getElementById('age').value, weight = document.getElementById('weight').value, height = document.getElementById('height').value;
            if (!age || !weight || !height) { tg.showAlert('Пожалуйста, заполните все поля'); return; }
            
            userProfile = {
                gender: document.getElementById('gender').value,
                age: parseInt(age),
                weight: parseInt(weight),
                height: parseInt(height),
                activity: document.getElementById('activity').value
            };
            
            // Mifflin-St Jeor
            let bmr = userProfile.gender === 'male' 
                ? (10 * userProfile.weight + 6.25 * userProfile.height - 5 * userProfile.age + 5) 
                : (10 * userProfile.weight + 6.25 * userProfile.height - 5 * userProfile.age - 161);
            
            const tdee = bmr * parseFloat(userProfile.activity);
            userProfile.targets = {
                kcal: Math.round(tdee),
                p: Math.round(tdee * 0.3 / 4),
                f: Math.round(tdee * 0.3 / 9),
                c: Math.round(tdee * 0.4 / 4)
            };

            localStorage.setItem('hybrid_user_profile', JSON.stringify(userProfile));
            tg.HapticFeedback.notificationOccurred('success');
            showTab('dashboard');
            updateUI();
        }

        function getTodayKey() { return new Date().toISOString().split('T')[0]; }

        function updateUI() {
            if (!userProfile) return;
            const targets = userProfile.targets;
            const cur = diary.reduce((acc, i) => { acc.k += i.k; acc.p += i.p; acc.f += i.f; acc.c += i.c; return acc; }, {k:0, p:0, f:0, c:0});
            
            document.getElementById('calories-target').innerText = targets.kcal;
            document.getElementById('calories-left').innerText = Math.max(0, targets.kcal - Math.round(cur.k));
            document.getElementById('calories-progress').style.width = Math.min(100, (cur.k / targets.kcal) * 100) + '%';
            
            updateMacro('p', cur.p, targets.p);
            updateMacro('f', cur.f, targets.f);
            updateMacro('c', cur.c, targets.c);

            const list = document.getElementById('diary-list');
            list.innerHTML = '';
            if (diary.length === 0) {
                list.innerHTML = '<p class="text-center opacity-40 py-8">Дневник пуст</p>';
            } else {
                diary.forEach((item, idx) => {
                    const el = document.createElement('div');
                    el.className = 'glass-card p-4 flex justify-between items-center';
                    el.innerHTML = `
                        <div>
                            <p class="font-semibold">${item.name} (${item.w}г)</p>
                            <p class="text-[10px] opacity-60 uppercase">${Math.round(item.k)} ккал | Б:${Math.round(item.p)} Ж:${Math.round(item.f)} У:${Math.round(item.c)}</p>
                        </div>
                        <button onclick="removeItem(${idx})" class="opacity-30 p-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
                    `;
                    list.appendChild(el);
                });
            }
        }

        function updateMacro(id, cur, tar) {
            document.getElementById(id + '-current').innerText = Math.round(cur);
            document.getElementById(id + '-target').innerText = tar;
            document.getElementById(id + '-progress').style.width = Math.min(100, (cur / tar) * 100) + '%';
        }

        function removeItem(idx) {
            diary.splice(idx, 1);
            localStorage.setItem('hybrid_diary_' + getTodayKey(), JSON.stringify(diary));
            updateUI();
        }

        function recalcManual() {
            const w = parseFloat(document.getElementById('m-weight').value) || 0;
            const k = parseFloat(document.getElementById('m-k').value) || 0;
            document.getElementById('m-total').innerText = Math.round((k * w) / 100) + ' ккал';
        }

        function saveManual() {
            const name = document.getElementById('m-name').value;
            const w = parseFloat(document.getElementById('m-weight').value);
            const k = parseFloat(document.getElementById('m-k').value);
            const p = parseFloat(document.getElementById('m-p').value) || 0;
            const f = parseFloat(document.getElementById('m-f').value) || 0;
            const c = parseFloat(document.getElementById('m-c').value) || 0;

            if (!name || isNaN(w) || isNaN(k)) {
                tg.showAlert('Укажите название, вес и калории');
                return;
            }

            const item = {
                name: name,
                w: w,
                k: (k * w) / 100,
                p: (p * w) / 100,
                f: (f * w) / 100,
                c: (c * w) / 100
            };

            diary.unshift(item);
            localStorage.setItem('hybrid_diary_' + getTodayKey(), JSON.stringify(diary));
            
            // Clear inputs
            document.getElementById('m-name').value = '';
            document.getElementById('m-k').value = '';
            document.getElementById('m-p').value = '';
            document.getElementById('m-f').value = '';
            document.getElementById('m-c').value = '';
            document.getElementById('m-weight').value = 100;
            document.getElementById('m-total').innerText = '0 ккал';

            tg.HapticFeedback.notificationOccurred('success');
            showTab('dashboard');
            updateUI();
        }

        async function checkSubscription() {
            const userId = tg.initDataUnsafe?.user?.id;
            if (!userId) return;
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChatMember?chat_id=${CHANNEL_ID}&user_id=${userId}`);
                const data = await res.json();
                if (data.ok && !['member', 'administrator', 'creator'].includes(data.result.status)) {
                    document.getElementById('sub-overlay').classList.remove('hidden');
                }
            } catch (e) { console.error(e); }
        }

        window.onload = init;
    </script>
</body>
</html>
